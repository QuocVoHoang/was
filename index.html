<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Motion Detection: JS Benchmark</title>
        <style>
            body { font-family: sans-serif; padding: 20px; background: #222; color: #fff; }
            .controls { margin-bottom: 20px; padding: 15px; background: #333; border-radius: 8px; }
            .canvas-container { display: flex; flex-direction: column; align-items: center; }
            canvas { 
                background: #000; 
                border: 2px solid #555; 
                border-radius: 8px;
                width: 800px;        
                max-width: 100%;        
                max-height: 65vh;       
                object-fit: contain;
            }
            .stats { font-size: 1.5em; font-weight: bold; color: #00ffcc; margin: 15px 0; font-family: monospace; }
            
            /* CSS cho các nút bấm */
            button { padding: 10px 15px; font-size: 1em; cursor: pointer; color: white; border: none; border-radius: 4px; margin-right: 10px; }
            #btnRunJS { background: #007bff; }
            #btnRunJS:hover { background: #0056b3; }
            #btnStop { background: #dc3545; }
            #btnStop:hover { background: #c82333; }
            button:disabled { background: #666; cursor: not-allowed; }
        </style>
    </head>
    <body>

        <div class="controls">
            <h2>Tải Video 4K MP4</h2>
            <input type="file" id="videoUpload" accept="video/mp4" style="color: white;"/>
            <br><br>
            <button id="btnRunJS">Chạy thuật toán (Vanilla JS)</button>
            <button id="btnStop" disabled>Dừng</button>
        </div>

        <video id="videoPlayer" controls loop muted style="display: none;"></video>

        <div class="canvas-container">
            <div class="stats" id="fpsCounter">Đang chờ video...</div>
            <canvas id="outputCanvas"></canvas>
        </div>

        <script src="js_motion.js"></script>
        <script src="app.js"></script>
    </body>
</html>
