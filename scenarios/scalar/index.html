<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Scenario 1: JS vs WASM (Scalar) Benchmark</title>
        <style>
            body { font-family: sans-serif; padding: 15px; background: #222; color: #fff; }
            .controls { margin-bottom: 10px; padding: 10px; background: #333; border-radius: 8px; }
            .canvas-container { display: flex; flex-direction: column; align-items: center; }
            canvas { 
                background: #000; 
                border: 2px solid #555; 
                border-radius: 8px;
                width: 800px;        
                max-width: 100%;        
                max-height: 65vh;       
                object-fit: contain;
            }
            .stats { font-size: 1.5em; font-weight: bold; color: #00ffcc; margin: 15px 0; font-family: monospace; }
            h2 {margin: 10px}

            /* Button styles */
            button { padding: 10px 15px; font-size: 1em; cursor: pointer; color: white; border: none; border-radius: 4px; margin-right: 10px; }
            #btnBenchmark { background: #e67e22; }
            #btnBenchmark:hover { background: #d35400; }
            #btnStop { background: #dc3545; }
            #btnStop:hover { background: #c82333; }
            button:disabled { background: #666; cursor: not-allowed; }

            /* Comparison table */
            .comparison-table {
                width: 100%;
                border-collapse: collapse;
                font-family: monospace;
                font-size: 0.95em;
                margin-top: 10px;
            }
            .comparison-table th {
                background: #2d2d5e;
                color: #a8b2ff;
                padding: 10px 14px;
                text-align: left;
                border-bottom: 2px solid #444;
            }
            .comparison-table td {
                padding: 8px 14px;
                border-bottom: 1px solid #333;
            }
            .comparison-table tr:nth-child(even) {
                background: #2a2a2a;
            }
            .comparison-table tr:nth-child(odd) {
                background: #242424;
            }
            .comparison-table .section-header {
                background: #1a1a3e;
                color: #ffd166;
                font-weight: bold;
                font-size: 0.9em;
                text-transform: uppercase;
                letter-spacing: 1px;
            }
        </style>
    </head>
    <body>

        <div class="controls">
            <h2>Scenario 1: Scalar — Upload 4K MP4 Video</h2>
            <input type="file" id="videoUpload" accept="video/mp4" style="color: white;"/>
            <br><br>
            <button id="btnBenchmark">⚡ Benchmark (JS → WASM)</button>
            <button id="btnStop" disabled>Stop</button>
        </div>

        <video id="videoPlayer" controls loop muted style="display: none;"></video>

        <div class="canvas-container">
            <div class="stats" id="fpsCounter">Waiting for video...</div>
            <canvas id="outputCanvas"></canvas>
        </div>

        <div id="comparisonContainer" style="display: none; width: min(100%, 820px); margin: 15px auto;"></div>

        <script src="js/benchmark_stats.js"></script>
        <script src="js/js_motion.js"></script>
        <script src="js/wasm_motion_bridge.js"></script>
        <script src="js/app.js"></script>
    </body>
</html>
